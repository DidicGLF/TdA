name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION.replace(/^v/, '');
            let c = fs.readFileSync('src-tauri/tauri.conf.json', 'utf8');
            c = c.replace(/\"version\":\s*\"[^\"]+\"/, '\"version\": \"' + v + '\"');
            fs.writeFileSync('src-tauri/tauri.conf.json', c);
            let t = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            t = t.replace(/^version = \"[^\"]+\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', t);
            console.log('Version set to:', v);
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npx @tauri-apps/cli@^2 icon src-tauri/app-icon.svg

      - name: Build
        run: npx @tauri-apps/cli@^2 build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TdA-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION.replace(/^v/, '');
            let c = fs.readFileSync('src-tauri/tauri.conf.json', 'utf8');
            c = c.replace(/\"version\":\s*\"[^\"]+\"/, '\"version\": \"' + v + '\"');
            fs.writeFileSync('src-tauri/tauri.conf.json', c);
            let t = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            t = t.replace(/^version = \"[^\"]+\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', t);
            console.log('Version set to:', v);
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npx @tauri-apps/cli@^2 icon src-tauri/app-icon.svg

      - name: Build
        run: npx @tauri-apps/cli@^2 build --bundles appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TdA-Linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION.replace(/^v/, '');
            let c = fs.readFileSync('src-tauri/tauri.conf.json', 'utf8');
            c = c.replace(/\"version\":\s*\"[^\"]+\"/, '\"version\": \"' + v + '\"');
            fs.writeFileSync('src-tauri/tauri.conf.json', c);
            let t = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            t = t.replace(/^version = \"[^\"]+\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', t);
            console.log('Version set to:', v);
          "

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npx @tauri-apps/cli@^2 icon src-tauri/app-icon.svg

      - name: Init Android project
        run: npx @tauri-apps/cli@^2 android init

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > tda-release.jks

      - name: Build APK
        run: npx @tauri-apps/cli@^2 android build --apk --target aarch64

      - name: Sign APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks tda-release.jks \
            --ks-pass pass:${{ secrets.ANDROID_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --out tda-signed.apk \
            "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TdA-Android
          path: tda-signed.apk
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TdA-Windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TdA-Linux
          path: artifacts/linux

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: TdA-Android
          path: artifacts/android

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/linux/*.AppImage
            artifacts/android/**/*.apk
          generate_release_notes: true
